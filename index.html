<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Todo App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Background animated shapes -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Main Glass Panel Container -->
    <div class="container glass-panel">
        <header>
            <h1><i class="fas fa-check-double"></i> Tasks</h1>
            <p id="date-display"></p>
        </header>

        <div class="input-section advanced-form">
            <input type="text" id="todo-heading" placeholder="Heading Name..." autocomplete="off">
            <input type="text" id="todo-work" placeholder="Work / Category..." autocomplete="off">
            <input type="text" id="todo-caption" placeholder="Short Caption..." autocomplete="off">
            <textarea id="todo-description" placeholder="Long Description..." rows="2"></textarea>
            <input type="text" id="todo-hashtag" placeholder="#Hashtag..." autocomplete="off">
            <button id="add-btn"><i class="fas fa-plus"></i> Add Item</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="todo-list">
            <!-- Todo items will be added here via JS -->
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
